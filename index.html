<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WCJLM Membership Form</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.container{max-width:900px;margin:20px auto;background:#fff;padding:20px;border-radius:10px}
input,textarea,select{width:100%;padding:8px;margin:5px 0}
button{padding:10px;background:#1d4ed8;color:white;border:0;border-radius:6px}
fieldset{margin-bottom:15px}
.logo{width:180px;display:block;margin:0 auto 10px}
</style>
</head>
<body>
<div class="container">

<img src="logo.jpeg" class="logo"/>

<h2>West Coast Jubilee Life Ministries</h2>
<h3>Membership Census Form</h3>

<form id="form">

<fieldset>
<legend>Household Details *</legend>
<input id="mainContact" placeholder="Household Head Name" required>
<input id="familyName" placeholder="Family Name" required>
<input id="phone" placeholder="Primary Contact" required>
<textarea id="address" placeholder="Address" required></textarea>
<input id="date" type="date" required>
</fieldset>

<fieldset>
<legend>Father</legend>
<input id="fatherName" placeholder="Name">
</fieldset>

<fieldset>
<legend>Mother</legend>
<input id="motherName" placeholder="Name">
</fieldset>

<fieldset>
<legend>Declaration</legend>
<label><input type="checkbox" id="agree"> I confirm accuracy</label>
</fieldset>

<button type="submit">Submit</button>

</form>

<p id="msg"></p>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRElEtnaAszBfeUsyky4sVjm3Lw7x3FrX7kMJyFCL4tMsdEtwv7GFO9nvxMlJLKyOJ/exec";

document.getElementById("date").value = new Date().toISOString().split("T")[0];

document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault();

if(!document.getElementById("agree").checked){
document.getElementById("msg").innerText="Confirm declaration";
return;
}

const data = {
household:{
mainContact: document.getElementById("mainContact").value,
familyName: document.getElementById("familyName").value,
phone: document.getElementById("phone").value,
address: document.getElementById("address").value,
date: document.getElementById("date").value
},
father: document.getElementById("fatherName").value,
mother: document.getElementById("motherName").value
};

await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify(data)
});

window.location.href="thank-you.html";

});
</script>

</body>
</html>
