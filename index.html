<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WCJLM Membership Census</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
.container{max-width:1000px;margin:20px auto;background:#fff;padding:20px;border-radius:10px}
input,textarea,select{width:100%;padding:8px;margin:5px 0}
fieldset{margin-bottom:15px}
button{padding:10px;background:#1d4ed8;color:#fff;border:0;border-radius:6px}
.logo{width:180px;display:block;margin:auto}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.small{font-size:12px;color:#666}
</style>
</head>
<body>
<div class="container">

<img src="logo.jpeg" class="logo"/>

<h2>West Coast Jubilee Life Ministries</h2>
<h3>Membership Census Form</h3>

<form id="form">

<fieldset>
<legend>Household Details *</legend>
<div class="row">
<input id="mainContact" placeholder="Household Head Name" required>
<input id="familyName" placeholder="Family Name" required>
</div>
<div class="row">
<input id="phone" placeholder="Primary Contact" required>
<input id="email" placeholder="Email">
</div>
<textarea id="address" placeholder="Address" required></textarea>
<input id="date" type="date" required>
</fieldset>

<fieldset>
<legend>Father Details</legend>
<input id="fatherName" placeholder="Name">
<input id="fatherBirth" type="date">
<input id="fatherJob" placeholder="Employment">
</fieldset>

<fieldset>
<legend>Mother Details</legend>
<input id="motherName" placeholder="Name">
<input id="motherBirth" type="date">
<input id="motherJob" placeholder="Employment">
</fieldset>

<fieldset>
<legend>Children</legend>
<select id="hasChildren">
<option>No</option><option>Yes</option>
</select>
<div id="childrenBox"></div>
<button type="button" onclick="addChild()">+ Add Child</button>
</fieldset>

<fieldset>
<legend>Grandchildren</legend>
<select id="hasGrandchildren">
<option>No</option><option>Yes</option>
</select>
<div id="grandBox"></div>
<button type="button" onclick="addGrand()">+ Add Grandchild</button>
</fieldset>

<fieldset>
<legend>Declaration</legend>
<label><input type="checkbox" id="agree"> I confirm accuracy</label>
</fieldset>

<button type="submit">Submit</button>
<p id="msg"></p>

</form>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRElEtnaAszBfeUsyky4sVjm3Lw7x3FrX7kMJyFCL4tMsdEtwv7GFO9nvxMlJLKyOJ/exec";
document.getElementById("date").value = new Date().toISOString().split("T")[0];

function addChild(){
const div=document.createElement("div");
div.innerHTML=`<input placeholder="Child Name" class="cname">
<input type="date" class="cbirth">`;
document.getElementById("childrenBox").appendChild(div);
}

function addGrand(){
const div=document.createElement("div");
div.innerHTML=`<input placeholder="Grandchild Name" class="gname">
<input type="date" class="gbirth">`;
document.getElementById("grandBox").appendChild(div);
}

document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault();

if(!document.getElementById("agree").checked){
document.getElementById("msg").innerText="Confirm declaration";
return;
}

const children=[...document.querySelectorAll(".cname")].map((n,i)=>({
name:n.value,
birth:document.querySelectorAll(".cbirth")[i]?.value
}));

const grandchildren=[...document.querySelectorAll(".gname")].map((n,i)=>({
name:n.value,
birth:document.querySelectorAll(".gbirth")[i]?.value
}));

const data={
household:{
mainContact:mainContact.value,
familyName:familyName.value,
phone:phone.value,
email:email.value,
address:address.value,
date:date.value
},
father:{
name:fatherName.value,
birth:fatherBirth.value,
job:fatherJob.value
},
mother:{
name:motherName.value,
birth:motherBirth.value,
job:motherJob.value
},
children,
grandchildren
};

await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify(data)
});

window.location.href="thank-you.html";
});
</script>

</body>
</html>
